<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua VM-Level Obfuscator</title>
    <link rel="stylesheet" href="https://pyscript.net/snapshots/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/snapshots/2023.11.1/core.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e1e24; 
            color: #f8f8f2; 
            padding: 30px; 
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #282a36;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 { color: #ff79c6; margin-top: 0; border-bottom: 2px solid #44475a; padding-bottom: 10px; }
        p { color: #6272a4; font-size: 14px; margin-bottom: 8px; }
        textarea { 
            width: 100%; 
            height: 180px; 
            background: #181a1f; 
            color: #50fa7b; 
            border: 1px solid #44475a; 
            font-family: 'Fira Code', monospace; 
            padding: 12px; 
            box-sizing: border-box; 
            border-radius: 6px;
            resize: vertical;
            font-size: 13px;
        }
        .upload-section {
            background: #181a1f;
            border: 2px dashed #6272a4;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            text-align: center;
        }
        .upload-section input {
            color: #bd93f9;
            cursor: pointer;
        }
        button { 
            padding: 12px 28px; 
            background: #bd93f9; 
            border: none; 
            color: #282a36; 
            cursor: pointer; 
            margin: 10px 0; 
            font-weight: bold; 
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover { background: #ff79c6; }
        .status { 
            background: #44475a;
            color: #ffb86c; 
            font-family: monospace; 
            padding: 10px 15px; 
            border-radius: 4px;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Lua VM-Level Obfuscator</h2>
        
        <div class="upload-section">
            <p style="color: #ff79c6; font-weight: bold;">Büyük Kodlar İçin Dosya Yükleyin (Kasmayı Engeller):</p>
            <input type="file" id="luaFileInput" accept=".lua,.txt">
        </div>

        <p>Veya Küçük Kodları Buraya Yazın:</p>
        <textarea id="inputCode">print("Selam VM Dunyasi!")</textarea>
        
        <button onclick="bridgeExecute()">Python ile VM Koduna Dönüştür</button>
        
        <p>Üretilen VM Tabanlı Kod:</p>
        <textarea id="outputCode" readonly placeholder="Korumalı kod burada belirecek..."></textarea>
        
        <div id="statusBox" class="status">Sistem hazır. Python yükleniyor...</div>
    </div>

    <script type="py" src="./obfuscator.py"></script>

    <script>
        function setSystemReady() {
            document.getElementById("statusBox").innerText = "Python Altyapısı Aktif ve Hazır!";
            document.getElementById("statusBox").style.color = "#50fa7b";
        }

        function bridgeExecute() {
            try {
                document.getElementById("statusBox").innerText = "Kod analiz ediliyor...";
                let fileInput = document.getElementById("luaFileInput");
                
                // Eğer kullanıcı dosya seçtiyse, dosyayı kasma olmadan oku
                if (fileInput.files.length > 0) {
                    let file = fileInput.files[0];
                    let reader = new FileReader();
                    
                    reader.onload = function(e) {
                        let fileContent = e.target.result;
                        processWithPython(fileContent);
                    };
                    reader.readAsText(file);
                } else {
                    // Dosya seçilmediyse normal kutudaki metni al
                    let inputLua = document.getElementById("inputCode").value;
                    processWithPython(inputLua);
                }
            } catch (err) {
                document.getElementById("statusBox").innerText = "Hata: " + err.message;
                document.getElementById("statusBox").style.color = "#ff5555";
            }
        }

        function processWithPython(codeToObfuscate) {
            if (window.py_obfuscate) {
                document.getElementById("statusBox").innerText = "Python devasa kodu kasma olmadan işliyor...";
                let obfuscatedResult = window.py_obfuscate(codeToObfuscate);
                document.getElementById("outputCode").value = obfuscatedResult;
                document.getElementById("statusBox").innerText = "Başarılı! VM Kodu Üretildi.";
                document.getElementById("statusBox").style.color = "#50fa7b";
            } else {
                document.getElementById("statusBox").innerText = "Hata: Python motoru yüklenemedi.";
                document.getElementById("statusBox").style.color = "#ff5555";
            }
        }
    </script>
</body>
</html>
