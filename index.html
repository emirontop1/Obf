<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua VM-Level Obfuscator</title>
    <link rel="stylesheet" href="https://pyscript.net/snapshots/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/snapshots/2023.11.1/core.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e1e24; 
            color: #f8f8f2; 
            padding: 30px; 
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #282a36;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 { color: #ff79c6; margin-top: 0; border-bottom: 2px solid #44475a; padding-bottom: 10px; }
        p { color: #6272a4; font-size: 14px; margin-bottom: 8px; }
        textarea { 
            width: 100%; 
            height: 180px; 
            background: #181a1f; 
            color: #50fa7b; 
            border: 1px solid #44475a; 
            font-family: 'Fira Code', monospace; 
            padding: 12px; 
            box-sizing: border-box; 
            border-radius: 6px;
            resize: vertical;
            font-size: 13px;
        }
        button { 
            padding: 12px 28px; 
            background: #bd93f9; 
            border: none; 
            color: #282a36; 
            cursor: pointer; 
            margin: 18px 0; 
            font-weight: bold; 
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover { background: #ff79c6; }
        .status { 
            background: #44475a;
            color: #ffb86c; 
            font-family: monospace; 
            padding: 10px 15px; 
            border-radius: 4px;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Lua VM-Level Obfuscator</h2>
        
        <p>Kaynak Lua Kodunu Yazın:</p>
        <textarea id="inputCode">print("Selam VM Dunyasi!")</textarea>
        
        <button onclick="bridgeExecute()">Python ile VM Koduna Dönüştür</button>
        
        <p>Üretilen VM Tabanlı Kod:</p>
        <textarea id="outputCode" readonly placeholder="Korumalı kod burada belirecek..."></textarea>
        
        <div id="statusBox" class="status">Sistem hazır. Python motoru arka planda kuruluyor...</div>
    </div>

    <script type="py" src="./obfuscator.py"></script>

    <script>
        // Python başarıyla yüklendiğinde çalışacak fonksiyon
        function setSystemReady() {
            document.getElementById("statusBox").innerText = "Python Altyapısı Aktif ve Hazır!";
            document.getElementById("statusBox").style.color = "#50fa7b";
        }

        // JavaScript Köprüsü (HTML -> Python -> HTML bağlantısı)
        function bridgeExecute() {
            try {
                document.getElementById("statusBox").innerText = "Python VM derleyicisi çalışıyor...";
                let inputLua = document.getElementById("inputCode").value;
                
                if (window.py_obfuscate) {
                    // Python içindeki fonksiyonu doğrudan tetikliyoruz
                    let obfuscatedResult = window.py_obfuscate(inputLua);
                    document.getElementById("outputCode").value = obfuscatedResult;
                    document.getElementById("statusBox").innerText = "Başarılı! VM Seviyesinde Kod Üretildi.";
                    document.getElementById("statusBox").style.color = "#50fa7b";
                } else {
                    document.getElementById("statusBox").innerText = "Hata: Python motoru henüz tamamen yüklenmedi.";
                    document.getElementById("statusBox").style.color = "#ff5555";
                }
            } catch (err) {
                document.getElementById("statusBox").innerText = "Hata oluştu: " + err.message;
                document.getElementById("statusBox").style.color = "#ff5555";
            }
        }
    </script>
</body>
</html>
